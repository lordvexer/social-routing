name: Update Social IP Lists


on:

  schedule:

    - cron: "0 */6 * * *"


  workflow_dispatch:



permissions:

  contents: write



jobs:


  update:


    runs-on: ubuntu-latest



    steps:


      - name: Checkout repository

        uses: actions/checkout@v4



      - name: Setup Node.js

        uses: actions/setup-node@v4

        with:

          node-version: 24



      - name: Install dependencies

        run:

          npm install



      - name: Generate social.json

        run:

          npm run update



      - name: Commit changes

        run: |


          git config user.name "github-actions"

          git config user.email "github-actions@github.com"


          git add social.json


          git diff --cached --quiet || git commit -m "Update social IP lists"


          git push